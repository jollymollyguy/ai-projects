<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App — ROB1N</title>
    <style>
        /* ── Reset ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ── Body ── */
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        /* ── Heading ── */
        h1 { font-size: 2rem; margin-bottom: 8px; }
        p.subtitle { margin-bottom: 30px; color: #aaa; }

        /* ── Search Box ── */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            width: 250px;
            background: #16213e;
            color: white;
            outline: none;
        }

        /* ── Button ── */
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover { background-color: #45a049; }

        /* ── Weather Card ── */
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 30px;
            width: 350px;
            text-align: center;
            display: none;
        }

        .card h2 { font-size: 1.8rem; margin-bottom: 8px; }
        .card .temp { font-size: 3rem; font-weight: bold; color: #4CAF50; }
        .card .description { color: #aaa; margin: 8px 0; text-transform: capitalize; }
        .card .humidity { color: #aaa; font-size: 0.9rem; }

        /* ── Error Message ── */
        .error { color: #ff6b6b; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <h1>🌤 Weather App</h1>
    <p class="subtitle">Built by ROB1N | Nepal</p>

    <!-- Search Box -->
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city name..." />
        <button id="searchBtn">Search</button>
    </div>

    <!-- Weather Card -->
    <div class="card" id="weatherCard">
        <h2 id="cityName"></h2>
        <div class="temp" id="temp"></div>
        <div class="description" id="description"></div>
        <div class="humidity" id="humidity"></div>
    </div>

    <!-- Error Message -->
    <p class="error" id="errorMsg">City not found. Try again.</p>

    <script>
        // ── Config ──────────────────────────────────────────
        const API_KEY = "your_api_key_here"; //

        // ── Elements ─────────────────────────────────────────
        const searchBtn  = document.getElementById('searchBtn');
        const cityInput  = document.getElementById('cityInput');
        const weatherCard = document.getElementById('weatherCard');
        const errorMsg   = document.getElementById('errorMsg');

        // ── Fetch Weather ─────────────────────────────────────
        function fetchWeather(city) {
            searchBtn.textContent = "Loading...";
            weatherCard.style.display = "none";
            errorMsg.style.display = "none";

            const url = `http://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.cod === 200) {
                        document.getElementById('cityName').textContent = data.name;
                        document.getElementById('temp').textContent = `${data.main.temp}°C`;
                        document.getElementById('description').textContent = data.weather[0].description;
                        document.getElementById('humidity').textContent = `Humidity: ${data.main.humidity}%`;
                        weatherCard.style.display = "block";
                    } else {
                        errorMsg.style.display = "block";
                    }
                    searchBtn.textContent = "Search";
                })
                .catch(error => {
                    errorMsg.style.display = "block";
                    searchBtn.textContent = "Search";
                    console.error("Fetch error:", error);
                });
        }

        // ── Event Listeners ───────────────────────────────────
        searchBtn.addEventListener('click', function() {
            const city = cityInput.value.trim();
            if (!city) return;
            fetchWeather(city);
        });

        // Search on Enter key
        cityInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchBtn.click();
        });
    </script>

</body>
</html>
